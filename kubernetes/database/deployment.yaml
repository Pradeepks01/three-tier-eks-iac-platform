# =============================================================================
# MongoDB Deployment — Database Tier
# =============================================================================
# Runs a single MongoDB 6.0 instance for the application's data layer.
# Credentials are injected from a Kubernetes Secret. Persistent storage
# is enabled via a PVC so data survives pod restarts.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: three-tier
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: three-tier-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: mongodb
          image: mongo:6.0
          command:
            - "numactl"
            - "--interleave=all"
            - "mongod"
            - "--wiredTigerCacheSizeGB"
            - "0.1"
            - "--bind_ip"
            - "0.0.0.0"
          ports:
            - containerPort: 27017
              protocol: TCP
              name: mongodb
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongo-credentials
                  key: username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-credentials
                  key: password
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          # Uncomment below to enable persistent storage (recommended for production)
          # volumeMounts:
          #   - name: mongo-persistent-storage
          #     mountPath: /data/db
      # volumes:
      #   - name: mongo-persistent-storage
      #     persistentVolumeClaim:
      #       claimName: mongo-pvc