# =============================================================================
# MongoDB Credentials Secret
# =============================================================================
# Stores the MongoDB root username and password as base64-encoded values.
#
# IMPORTANT: In production, use a secrets manager (e.g. AWS Secrets Manager
# with External Secrets Operator) instead of storing credentials in manifests.
#
# To encode a value:   echo -n "your-password" | base64
# To decode a value:   echo "cGFzc3dvcmQxMjM=" | base64 -d
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: mongo-credentials
  namespace: three-tier
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: database
type: Opaque
data:
  username: YWRtaW4=          # admin
  password: cGFzc3dvcmQxMjM=  # password123 — CHANGE THIS in production!