# =============================================================================
# API Service — Internal ClusterIP for Backend
# =============================================================================
# Exposes the API deployment within the cluster on port 8080.
# The Ingress controller routes /api traffic to this service.
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: three-tier
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
