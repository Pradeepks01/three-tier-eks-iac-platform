# =============================================================================
# API Deployment — Backend Express.js Service
# =============================================================================
# Runs the REST API tier that connects to MongoDB and serves task CRUD
# endpoints. Includes health probes for Kubernetes self-healing.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: three-tier
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: three-tier-app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 25%
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: api
          image: <YOUR_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/three-tier-api:latest  # TODO: Replace with your ECR image URI
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: MONGO_CONN_STR
              value: "mongodb://mongodb-svc:27017/todo?directConnection=true"
            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongo-credentials
                  key: username
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-credentials
                  key: password
          # Liveness probe — restarts the pod if the API becomes unresponsive
          livenessProbe:
            httpGet:
              path: /ok
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          # Readiness probe — removes the pod from service until it's ready
          readinessProbe:
            httpGet:
              path: /ok
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            successThreshold: 1
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi